<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice-Activated Literacy Assessment</title>
<style>
:root { --primary: #2563eb; --success: #22c55e; --danger: #ef4444; --bg: #f8fafc; }
body { font-family: 'Segoe UI', Roboto, Helvetica, Arial; text-align: center; padding: 20px; background-color: var(--bg); color: #1e293b; }
#quiz-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); display: inline-block; max-width: 800px; width: 100%; margin-top: 20px; }
.input-group { margin-bottom: 20px; text-align: left; max-width: 400px; margin-left: auto; margin-right: auto; }
label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
input { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; outline: none; }
.btn { padding: 12px 24px; font-size: 16px; font-weight: 600; border-radius: 8px; cursor: pointer; border: none; transition: all 0.2s; }
.btn-primary { background-color: var(--primary); color: white; width: 100%; max-width: 400px; }
.btn-primary:hover { background-color: #1d4ed8; }
#btnSpeak { background-color: var(--success); color: white; font-size: 20px; padding: 20px 40px; border-radius: 50px; margin: 20px 0; }
#btnSpeak:disabled { background-color: #cbd5e1; cursor: not-allowed; }
#question { font-size: 26px; font-weight: 700; margin: 30px 0; color: #0f172a; }
#transcript { min-height: 24px; color: #64748b; font-style: italic; margin-bottom: 10px; }
#result-feedback { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
.correct { color: var(--success); }
.incorrect { color: var(--danger); }
.table-container { overflow-x: auto; margin-top: 30px; }
table { width: 100%; border-collapse: collapse; background: white; }
th, td { border: 1px solid #e2e8f0; padding: 15px; text-align: left; }
th { background-color: #f1f5f9; color: #475569; font-weight: 700; }
.hidden { display: none; }
@media print { .no-print { display: none; } #quiz-card { box-shadow: none; border: 1px solid #000; } }
</style>
</head>
<body>

<div id="quiz-card">
  <!-- Setup -->
  <div id="setup-section">
    <h1>Literacy Assessment</h1>
    <p>Please enter student details to begin.</p>
    <div class="input-group">
      <label>Student ID</label>
      <input type="text" id="studentID" placeholder="Enter Student ID">
      <div id="studentIdError" class="hidden" style="color: var(--danger); font-weight: 600; margin-top: 6px;">Student ID not registered.</div>
    </div>
    <div class="input-group">
      <label>Grade Level</label>
      <input type="text" id="gradeLevel" placeholder="e.g., 10">
    </div>
    <div class="input-group">
      <label>Section</label>
      <input type="text" id="section" placeholder="e.g., Diamond">
    </div>
    <button class="btn btn-primary" onclick="startQuiz()">Login</button>
  </div>

  <!-- Dashboard -->
  <div id="dashboard-section" class="hidden">
    <h1>Dashboard</h1>
    <p>Choose an option to proceed.</p>
    <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
      <button class="btn" onclick="showBooks()" style="background-color: #8b5cf6; color: white; padding: 20px 40px; font-size: 18px;">📚 Read Books</button>
      <button class="btn" onclick="showQuizMenu()" style="background-color: var(--success); color: white; padding: 20px 40px; font-size: 18px;">🎤 Take Quiz</button>
    </div>
  </div>

  <!-- Quiz Menu -->
  <div id="quiz-menu-section" class="hidden">
    <h1>Quiz Menu</h1>
    <p>Select a quiz to take.</p>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
      <button class="btn" onclick="attemptQuiz(0)" style="background-color: var(--primary); color: white; padding: 15px 30px; font-size: 18px; width: 200px;">Quiz 1</button>
      <button class="btn" onclick="attemptQuiz(1)" style="background-color: var(--primary); color: white; padding: 15px 30px; font-size: 18px; width: 200px;">Quiz 2</button>
      <button class="btn" onclick="attemptQuiz(2)" style="background-color: var(--primary); color: white; padding: 15px 30px; font-size: 18px; width: 200px;">Quiz 3</button>
    </div>
    <div style="margin-top: 30px;" class="no-print">
      <button class="btn btn-primary" onclick="backToDashboardFromMenu()">Back to Dashboard</button>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz-section" class="hidden">
    <div id="info-bar" style="text-align: left; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 20px;">
      <strong id="display-name"></strong> | <span id="display-gs"></span>
    </div>
    <div id="question"></div>
    <button id="btnSpeak" class="btn">🎤 Tap to Speak Answer</button>
    <div id="transcript"></div>
    <div id="result-feedback"></div>
    <div id="score-display" style="font-weight: bold; font-size: 18px;">Score: 0 / 5</div>
    <div style="margin-top: 20px;" class="no-print">
      <button class="btn" onclick="backToQuizMenu()" style="background: #64748b; color: white;">Back to Quiz Menu</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

// 🔹 Firebase config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
  projectId: "student-quiz-system",
  storageBucket: "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Quiz setup (same as before)
const quizzes = [
  { name: "Quiz 1", password: "quiz1", questions: [{q:"What is a figure of speech comparing two things using 'like' or 'as'?", a:"Simile", keywords:["simile"]}, {q:"Name one famous poem by Robert Frost.", a:"The Road Not Taken", keywords:["road","not","taken"]}]},
  { name: "Quiz 2", password: "quiz2", questions: [{q:"What is the capital of France?", a:"Paris", keywords:["paris"]}, {q:"What is 2 + 2?", a:"4", keywords:["four","4"]}]},
  { name: "Quiz 3", password: "quiz3", questions: [{q:"Who wrote Romeo and Juliet?", a:"Shakespeare", keywords:["shakespeare"]}, {q:"What is the largest planet?", a:"Jupiter", keywords:["jupiter"]}]}
];

let currentQuiz = null;
let currentIndex = 0;
let score = 0;
let attempts = 0;

function startQuiz() {
  const studentID = document.getElementById('studentID').value.trim();
  const grade = document.getElementById('gradeLevel').value.trim();
  const section = document.getElementById('section').value.trim();
  const validIDs = ['001','002','003'];
  const studentError = document.getElementById('studentIdError');
  studentError.classList.add('hidden');

  if(!studentID || !grade || !section){
    alert("Please fill all fields.");
    return;
  }

  if(!validIDs.includes(studentID)){
    studentError.textContent = 'Student ID not registered.';
    studentError.classList.remove('hidden');
    return;
  }

  document.getElementById('display-name').textContent = studentID;
  document.getElementById('display-gs').textContent = `${grade} - ${section}`;
  document.getElementById('setup-section').classList.add('hidden');
  document.getElementById('dashboard-section').classList.remove('hidden');
}

async function finishQuiz() {
  const studentID = document.getElementById('studentID').value;
  const grade = document.getElementById('gradeLevel').value;
  const section = document.getElementById('section').value;
  const quizName = currentQuiz.name;
  attempts++;

  try {
    await addDoc(collection(db,"Results"),{
      studentID,
      grade,
      section,
      quiz: quizName,
      score,
      attempts
    });
  } catch(e){ console.error(e); }

  currentQuiz = null; currentIndex = 0; score = 0;
}

// Expose functions globally for onclick
window.startQuiz = startQuiz;
</script>
</body>
</html>
