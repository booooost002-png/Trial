<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice-Activated Literacy Assessment</title>
  <style>
    :root {
      --primary: #2563eb;
      --success: #22c55e;
      --danger: #ef4444;
      --bg: #f8fafc;
    }

    body { 
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      text-align: center; 
      padding: 20px; 
      background-color: var(--bg);
      color: #1e293b;
    }

    #quiz-card { 
      background: white; 
      padding: 40px; 
      border-radius: 16px; 
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); 
      display: inline-block; 
      max-width: 800px; 
      width: 100%; 
      margin-top: 20px;
    }

    /* Form Styling */
    .input-group { margin-bottom: 20px; text-align: left; max-width: 400px; margin-left: auto; margin-right: auto; }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
    input { 
      width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; 
      border: 1px solid #cbd5e1; box-sizing: border-box; outline: none;
    }
    input:focus { border-color: var(--primary); ring: 2px solid #bfdbfe; }

    /* Buttons */
    .btn { 
      padding: 12px 24px; font-size: 16px; font-weight: 600; border-radius: 8px; 
      cursor: pointer; border: none; transition: all 0.2s; 
    }
    .btn-primary { background-color: var(--primary); color: white; width: 100%; max-width: 400px; }
    .btn-primary:hover { background-color: #1d4ed8; }
    
    #btnSpeak { 
      background-color: var(--success); color: white; font-size: 20px; 
      padding: 20px 40px; border-radius: 50px; margin: 20px 0;
    }
    #btnSpeak:disabled { background-color: #cbd5e1; cursor: not-allowed; }

    /* Quiz Text */
    #question { font-size: 26px; font-weight: 700; margin: 30px 0; color: #0f172a; }
    #transcript { min-height: 24px; color: #64748b; font-style: italic; margin-bottom: 10px; }
    
    #result-feedback { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
    .correct { color: var(--success); }
    .incorrect { color: var(--danger); }

    /* Table */
    .table-container { overflow-x: auto; margin-top: 30px; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { border: 1px solid #e2e8f0; padding: 15px; text-align: left; }
    th { background-color: #f1f5f9; color: #475569; font-weight: 700; }
    
    .hidden { display: none; }

    @media print {
      .no-print { display: none; }
      #quiz-card { box-shadow: none; border: 1px solid #000; }
    }
  </style>
</head>
<body>

  <div id="quiz-card">
    <div id="setup-section">
      <h1 style="margin-bottom: 10px;">Literacy Assessment</h1>
      <p style="color: #64748b; margin-bottom: 30px;">Please enter student details to begin.</p>
      
      <div class="input-group">
        <label>Student Full Name</label>
        <input type="text" id="userName" placeholder="First Name Last Name">
      </div>
      
      <div class="input-group">
        <label>Grade Level</label>
        <input type="text" id="gradeLevel" placeholder="e.g., Grade 10">
      </div>
      
      <div class="input-group">
        <label>Section</label>
        <input type="text" id="section" placeholder="e.g., Diamond">
      </div>

      <button class="btn btn-primary" onclick="startQuiz()">Enter Quiz</button>
    </div>

    <div id="quiz-section" class="hidden">
      <div id="info-bar" style="text-align: left; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 20px;">
        <strong id="display-name"></strong> | <span id="display-gs"></span>
      </div>

      <div id="question"></div>
      
      <button id="btnSpeak" class="btn">🎤 Tap to Speak Answer</button>
      
      <div id="transcript"></div>
      <div id="result-feedback"></div>
      <div id="score-display" style="font-weight: bold; font-size: 18px;">Score: 0 / 5</div>
    </div>

    <div id="ranking-section" class="hidden">
      <h2 style="font-size: 24px;">🏆 Assessment Results</h2>
      
      <div class="table-container">
        <table id="rankingTable">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Student Name</th>
              <th>Grade & Section</th>
              <th>Score</th>
            </tr>
          </thead>
          <tbody id="rankingBody"></tbody>
        </table>
      </div>

      <div style="margin-top: 30px;" class="no-print">
        <button class="btn" onclick="window.print()" style="background: #64748b; color: white;">🖨️ Print Results</button>
        <button class="btn btn-primary" onclick="resetForNewUser()" style="margin-left: 10px;">Next Student</button>
      </div>
    </div>
  </div>

  <script>
    const quizData = [
      { q: "What is a figure of speech comparing two things using 'like' or 'as'?", a: "Simile" },
      { q: "Name one famous poem by Robert Frost.", a: "The Road Not Taken" }
    ];

    let currentIndex = 0;
    let score = 0;
    let allResults = [];

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = SpeechRecognition ? new SpeechRecognition() : null;

    if (recognition) {
      recognition.lang = 'en-US';
      recognition.interimResults = false;
    }

    function startQuiz() {
      const name = document.getElementById('userName').value.trim();
      const grade = document.getElementById('gradeLevel').value.trim();
      const section = document.getElementById('section').value.trim();

      if (!name || !grade || !section) {
        alert("Teacher: Please ensure all student fields are filled.");
        return;
      }

      document.getElementById('display-name').textContent = name;
      document.getElementById('display-gs').textContent = `${grade} - ${section}`;

      document.getElementById('setup-section').classList.add('hidden');
      document.getElementById('quiz-section').classList.remove('hidden');
      updateQuestion();
    }

    function updateQuestion() {
      if (currentIndex < quizData.length) {
        document.getElementById('question').textContent = `${currentIndex + 1}. ${quizData[currentIndex].q}`;
        document.getElementById('result-feedback').textContent = "";
        document.getElementById('transcript').textContent = "";
        document.getElementById('btnSpeak').disabled = false;
        document.getElementById('btnSpeak').textContent = "🎤 Tap to Answer";
      } else {
        finishQuiz();
      }
      document.getElementById('score-display').textContent = `Score: ${score} / ${quizData.length}`;
    }

    if (recognition) {
      document.getElementById('btnSpeak').onclick = () => {
        recognition.start();
        document.getElementById('btnSpeak').disabled = true;
        document.getElementById('btnSpeak').textContent = "Listening...";
      };

      recognition.onresult = (event) => {
        const userSpeech = event.results[0][0].transcript.toLowerCase();
        const correctAnswer = quizData[currentIndex].a.toLowerCase();
        
        document.getElementById('transcript').textContent = `Spoken: "${userSpeech}"`;

        // Check if correct keywords exist in the speech
        if (userSpeech.includes(correctAnswer) || correctAnswer.includes(userSpeech)) {
          document.getElementById('result-feedback').textContent = "Correct! ✅";
          document.getElementById('result-feedback').className = "correct";
          score++;
        } else {
          document.getElementById('result-feedback').textContent = "Incorrect ❌";
          document.getElementById('result-feedback').className = "incorrect";
        }

        setTimeout(() => {
          currentIndex++;
          updateQuestion();
        }, 2000);
      };

      recognition.onerror = () => {
        alert("Speech error. Check microphone permissions.");
        document.getElementById('btnSpeak').disabled = false;
        document.getElementById('btnSpeak').textContent = "🎤 Try Again";
      };
    }

    function finishQuiz() {
      const name = document.getElementById('userName').value;
      const gs = `${document.getElementById('gradeLevel').value} - ${document.getElementById('section').value}`;
      
      allResults.push({ name, gs, score });
      allResults.sort((a, b) => b.score - a.score);
      
      document.getElementById('quiz-section').classList.add('hidden');
      document.getElementById('ranking-section').classList.remove('hidden');
      
      const tbody = document.getElementById('rankingBody');
      tbody.innerHTML = "";
      allResults.forEach((res, index) => {
        tbody.innerHTML += `
          <tr>
            <td>${index + 1}</td>
            <td>${res.name}</td>
            <td>${res.gs}</td>
            <td>${res.score} / ${quizData.length}</td>
          </tr>`;
      });
    }

    function resetForNewUser() {
      currentIndex = 0;
      score = 0;
      document.getElementById('userName').value = "";
      document.getElementById('gradeLevel').value = "";
      document.getElementById('section').value = "";
      document.getElementById('ranking-section').classList.add('hidden');
      document.getElementById('setup-section').classList.remove('hidden');
    }
  </script>
</body>
</html>
