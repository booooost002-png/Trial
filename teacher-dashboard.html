<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Literacy Assessment System</title>

<style>
:root{
  --primary:#2563eb;
  --success:#22c55e;
  --danger:#ef4444;
  --bg:#f8fafc;
}
body{
  font-family:'Segoe UI',Roboto,Helvetica,Arial;
  text-align:center;
  padding:20px;
  background:var(--bg);
  color:#1e293b;
}
#quiz-card{
  background:white;
  padding:40px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.1);
  display:inline-block;
  max-width:800px;
  width:100%;
}
.login-container {
  max-width: 400px;
  margin: 0 auto;
  text-align: left;
}
.input-group{
  margin-bottom: 20px;
}
label{
  font-weight:600;
  font-size:14px;
  display:block;
  margin-bottom:8px;
}
input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #cbd5e1;
  box-sizing: border-box;
}
.btn{
  padding:12px 24px;
  font-size:16px;
  font-weight:600;
  border-radius:8px;
  cursor:pointer;
  border:none;
  transition:.2s;
}
.btn-primary{
  background:var(--primary);
  color:white;
}
.btn-primary:hover{
  background:#1d4ed8;
}
#teacher-login .btn-primary {
  margin-top: 14px;
  width: auto; 
  display: inline-block;
  padding-left: 30px; 
  padding-right: 30px;
}
.hidden{
  display:none;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}
th,td{
  border:1px solid #e2e8f0;
  padding:12px;
}
th{
  background:#f1f5f9;
}
.error{
  color: var(--danger);
  font-weight: 600;
  margin-top: 10px;
  margin-bottom: 10px;
}
.reset-btn{
  background:#f59e0b;
  color:white;
  padding:6px 12px;
  font-size:14px;
  border-radius:6px;
  cursor:pointer;
  border:none;
}
.reset-btn:hover{
  background:#d97706;
}
@media print{
  .no-print{display:none}
}
</style>
</head>

<body>
<div id="quiz-card">

  <div id="teacher-login" style="margin-top: 40px;">
    <h2>Teacher Login</h2>
    <div class="login-container">
      <div class="input-group">
        <label>Teacher ID</label>
        <input type="text" id="teacherID" placeholder="Enter ID">
      </div>
      <div id="loginError" class="error hidden" role="alert" aria-live="polite"></div>
      <button class="btn btn-primary" id="loginBtn">Login</button>
    </div>
  </div>

  <div id="teacher-dashboard" class="hidden">
    <h2>Teacher Dashboard</h2>
    <div style="margin-bottom: 20px; display: flex; justify-content: flex-end; gap: 10px; flex-wrap: wrap;">
      <button class="btn" id="logoutBtn" style="background:#ef4444;color:white;">Logout</button>
      <button class="btn" id="printBtn" style="background:#64748b;color:white;">🖨 Print Results</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Student ID</th>
          <th>Grade</th>
          <th>Section</th>
          <th>Quiz</th>
          <th>Score</th>
          <th>Attempts</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="teacherTable"></tbody>
    </table>
  </div>

</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

// Replace these with your Firebase config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
  projectId: "student-quiz-system",
  storageBucket: "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const validTeachers=["01","02","03"];

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const printBtn = document.getElementById("printBtn");

loginBtn.addEventListener("click", teacherLogin);
logoutBtn.addEventListener("click", logoutTeacher);
printBtn.addEventListener("click", () => window.print());

async function teacherLogin(){
  const id=document.getElementById("teacherID").value.trim();
  const errorEl=document.getElementById("loginError");
  errorEl.classList.add("hidden");
  errorEl.textContent = "";

  if(!validTeachers.includes(id)){
    errorEl.textContent = "Invalid Teacher ID. Please try again.";
    errorEl.classList.remove("hidden");
    return;
  }

  document.getElementById("teacher-login").classList.add("hidden");
  document.getElementById("teacher-dashboard").classList.remove("hidden");
  await loadTeacher();
}

function logoutTeacher(){
  document.getElementById("teacher-dashboard").classList.add("hidden");
  document.getElementById("teacher-login").classList.remove("hidden");
  document.getElementById("teacherID").value = "";
  document.getElementById("loginError").classList.add("hidden");
}

async function loadTeacher(){
  const body=document.getElementById("teacherTable");
  body.innerHTML="";
  try {
    const querySnapshot = await getDocs(collection(db, "Results"));
    let allResults = [];
    querySnapshot.forEach(docSnap => {
      const data = docSnap.data();
      allResults.push({
        id: data.studentID,
        grade: data.grade,
        section: data.section,
        quiz: data.quiz,
        score: data.score,
        attempts: data.attempts,
        docId: docSnap.id
      });
    });

    // Sort by score descending
    allResults.sort((a,b)=>b.score-a.score);

    allResults.forEach((r,index)=>{
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${r.id}</td>
        <td>${r.grade}</td>
        <td>${r.section}</td>
        <td>${r.quiz}</td>
        <td>${r.score}</td>
        <td>${r.attempts}</td>
        <td><button class="reset-btn">Reset Attempt</button></td>
      `;
      const resetBtn = tr.querySelector(".reset-btn");
      resetBtn.addEventListener("click", () => resetAttempt(r.docId));
      body.appendChild(tr);
    });
  } catch(e) {
    console.error("Error fetching data: ", e);
  }
}

async function resetAttempt(docId){
  if(confirm("Reset this student's attempt?")){
    const docRef = doc(db, "Results", docId);
    await updateDoc(docRef, { attempts: 0 });
    alert("Attempt reset successfully!");
    await loadTeacher();
  }
}
</script>
</body>
</html>
