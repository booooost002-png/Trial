<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Literacy Assessment System - Teacher Dashboard</title>

<style>
:root {
  --primary: #2563eb;
  --success: #22c55e;
  --danger: #ef4444;
  --bg: #f8fafc;
}
body {
  font-family: 'Segoe UI', Roboto, Helvetica, Arial;
  text-align: center;
  padding: 20px;
  background: var(--bg);
  color: #1e293b;
}
#quiz-card {
  background: white;
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, .1);
  display: inline-block;
  max-width: 900px;
  width: 100%;
}
.login-container {
  max-width: 400px;
  margin: 0 auto;
  text-align: left;
}
.input-group {
  margin-bottom: 20px;
}
label {
  font-weight: 600;
  font-size: 14px;
  display: block;
  margin-bottom: 8px;
}
input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #cbd5e1;
  box-sizing: border-box;
}
.btn {
  padding: 12px 24px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  border: none;
  transition: .2s;
}
.btn-primary {
  background: var(--primary);
  color: white;
}
.btn-primary:hover {
  background: #1d4ed8;
}
.hidden {
  display: none;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}
th, td {
  border: 1px solid #e2e8f0;
  padding: 12px;
}
th {
  background: #f1f5f9;
}
.error {
  color: var(--danger);
  font-weight: 600;
  margin-top: 10px;
}
.reset-btn {
  background: #f59e0b;
  color: white;
  padding: 6px 12px;
  font-size: 12px;
  border-radius: 6px;
  cursor: pointer;
  border: none;
  margin-right: 5px;
}
.delete-btn {
  background: #ef4444;
  color: white;
  padding: 6px 12px;
  font-size: 12px;
  border-radius: 6px;
  cursor: pointer;
  border: none;
}
@media print {
  .no-print, .btn, .reset-btn, .delete-btn {
    display: none !important;
  }
}
</style>
</head>

<body>
<div id="quiz-card">

  <div id="teacher-login" style="margin-top: 40px;">
    <h2>Teacher Login</h2>
    <div class="login-container">
      <div class="input-group">
        <label>Teacher ID</label>
        <input type="text" id="teacherID" placeholder="Enter ID" />
      </div>
      <div id="loginError" class="error hidden"></div>
      <button id="loginBtn" class="btn btn-primary">Login</button>
    </div>
  </div>

  <div id="teacher-dashboard" class="hidden">
    <h2>Teacher Dashboard</h2>
    <div class="no-print" style="margin-bottom: 20px; display: flex; justify-content: flex-end; gap: 10px;">
      <button id="logoutBtn" class="btn" style="background:#ef4444; color:white;">Logout</button>
      <button id="refreshBtn" class="btn" style="background:#10b981; color:white;">Refresh Data</button>
      <button id="printBtn" class="btn" style="background:#64748b; color:white;">🖨 Print Results</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Student ID</th>
          <th>Grade</th>
          <th>Section</th>
          <th>Quiz</th>
          <th>Score</th>
          <th>Attempts</th>
          <th class="no-print">Actions</th>
        </tr>
      </thead>
      <tbody id="teacherTable">
        </tbody>
    </table>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

  // TODO: PASTE YOUR ACTUAL FIREBASE CONFIG HERE
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "student-quiz-system",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const validTeachers = ["01", "02", "03"];

  async function teacherLogin() {
    const id = document.getElementById("teacherID").value.trim();
    const errorEl = document.getElementById("loginError");
    errorEl.classList.add("hidden");

    if (!validTeachers.includes(id)) {
      errorEl.textContent = "Invalid Teacher ID.";
      errorEl.classList.remove("hidden");
      return;
    }

    document.getElementById("teacher-login").classList.add("hidden");
    document.getElementById("teacher-dashboard").classList.remove("hidden");
    await loadTeacher();
  }

  async function loadTeacher() {
    const body = document.getElementById("teacherTable");
    body.innerHTML = "<tr><td colspan='7'>Loading results...</td></tr>";
    
    try {
      const querySnapshot = await getDocs(collection(db, "Results"));
      let allResults = [];
      
      querySnapshot.forEach(docSnap => {
        const data = docSnap.data();
        
        // SMART MAPPING: This checks for multiple ways the data might be named
        allResults.push({
          id: data.studentID || data.studentId || data.id || "N/A",
          grade: data.grade || data.Grade || "N/A",
          section: data.section || data.Section || "N/A",
          quiz: data.quiz || "N/A",
          score: (data.score !== undefined) ? data.score : 0,
          attempts: (data.attempts !== undefined) ? data.attempts : 0,
          docId: docSnap.id
        });
      });

      // Sort by score highest to lowest
      allResults.sort((a, b) => b.score - a.score);

      body.innerHTML = ""; // Clear loading message

      if (allResults.length === 0) {
        body.innerHTML = "<tr><td colspan='7'>No results found in database.</td></tr>";
        return;
      }

      allResults.forEach((r) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${r.id}</td>
            <td>${r.grade}</td>
            <td>${r.section}</td>
            <td>${r.quiz}</td>
            <td>${r.score}</td>
            <td>${r.attempts}</td>
            <td class="no-print">
              <button class="reset-btn">Reset</button>
              <button class="delete-btn">Delete</button>
            </td>
        `;

        // Attach actions to buttons
        tr.querySelector(".reset-btn").onclick = () => resetAttempt(r.docId);
        tr.querySelector(".delete-btn").onclick = () => deleteAttempt(r.docId);
        
        body.appendChild(tr);
      });
    } catch (e) {
      console.error("Error fetching data: ", e);
      body.innerHTML = `<tr><td colspan='7' style="color:red">Error: ${e.message}</td></tr>`;
    }
  }

  async function resetAttempt(docId) {
    if (confirm("Reset this student's attempt count to 0?")) {
      try {
        const docRef = doc(db, "Results", docId);
        await updateDoc(docRef, { attempts: 0 });
        alert("Attempt reset!");
        await loadTeacher();
      } catch (err) { alert("Error: " + err.message); }
    }
  }

  async function deleteAttempt(docId) {
    if (confirm("Permanently delete this record?")) {
      try {
        const docRef = doc(db, "Results", docId);
        await deleteDoc(docRef);
        alert("Record deleted!");
        await loadTeacher();
      } catch (err) { alert("Error: " + err.message); }
    }
  }

  function logoutTeacher() {
    document.getElementById("teacher-dashboard").classList.add("hidden");
    document.getElementById("teacher-login").classList.remove("hidden");
    document.getElementById("teacherID").value = "";
  }

  // Event Listeners
  document.getElementById('loginBtn').onclick = teacherLogin;
  document.getElementById('logoutBtn').onclick = logoutTeacher;
  document.getElementById('refreshBtn').onclick = loadTeacher;
  document.getElementById('printBtn').onclick = () => window.print();

</script>
</body>
</html>
